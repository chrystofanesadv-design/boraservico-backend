services:
  postgres:
    image: postgres:16
    container_name: boraservico-postgres
    restart: always
    environment:
      POSTGRES_USER: boraservico
      POSTGRES_PASSWORD: boraservico123
      POSTGRES_DB: boraservico
    ports:
      - "5432:5432"
    volumes:
      - boraservico_postgres_data:/var/lib/postgresql/data

volumes:
  boraservico_postgres_data:
